name: unicheck_mobile
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  timeago: ^3.7.1
  intl: ^0.20.2
  logger: ^2.6.2
  flutter_svg: ^2.0.17
  get: ^4.7.3
  shared_preferences: ^2.5.2
  firebase_messaging: ^16.0.4
  in_app_review: ^2.0.11
  share_plus: ^12.0.1
  url_launcher: ^6.3.2
  flutter_screenutil: ^5.9.3
  animated_bottom_navigation_bar: ^1.4.0
  lottie: ^3.3.1
  flutter_staggered_grid_view: ^0.7.0 
  loading_animation_widget: ^1.3.0
  image_picker: ^1.2.1
  carousel_slider: ^5.1.1
  fl_chart: ^0.71.0
  pie_chart: ^5.4.0
  path_provider: ^2.1.1
  path: ^1.8.3
  camera: ^0.12.0
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  google_sign_in: ^6.3.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  flutter_dotenv: ^5.2.1
  gal: ^2.3.2
  sqflite: ^2.4.2
  firebase_storage: ^13.0.6
  cloud_firestore: ^6.1.2
  google_generative_ai: ^0.4.7
  get_storage: ^2.1.1
  cached_network_image: ^3.4.1
  table_calendar: ^3.2.0
  mobile_scanner: ^7.2.0
  google_mlkit_face_detection: ^0.13.2
  flutter_launcher_icons: "^0.14.4"
  dio: ^5.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21 

flutter:
  uses-material-design: true
  assets:
      - assets/animations/
      - assets/images/
      - assets/icon/
